<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="session-recall cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#008859"/>
      <stop offset="1" stop-color="#00633f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.22" r="0.45">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Faint dotted grid for "memory" texture -->
  <g fill="#ffffff" opacity="0.06">
    <circle cx="40" cy="40" r="2"/>
    <circle cx="120" cy="40" r="2"/>
    <circle cx="200" cy="40" r="2"/>
    <circle cx="40" cy="120" r="2"/>
    <circle cx="120" cy="120" r="2"/>
    <circle cx="200" cy="120" r="2"/>
    <circle cx="40" cy="200" r="2"/>
    <circle cx="120" cy="200" r="2"/>
    <circle cx="200" cy="200" r="2"/>
    <circle cx="40" cy="280" r="2"/>
    <circle cx="120" cy="280" r="2"/>
    <circle cx="200" cy="280" r="2"/>
  </g>

  <!-- Old session bubbles, fading "lost context" -->
  <g opacity="0.20">
    <rect x="80" y="380" width="180" height="50" rx="14" fill="#ffffff"/>
    <rect x="80" y="445" width="220" height="50" rx="14" fill="#ffffff"/>
    <rect x="80" y="510" width="150" height="50" rx="14" fill="#ffffff"/>
  </g>
  <g opacity="0.38">
    <rect x="280" y="380" width="220" height="50" rx="14" fill="#ffffff"/>
    <rect x="280" y="445" width="180" height="50" rx="14" fill="#ffffff"/>
    <rect x="280" y="510" width="200" height="50" rx="14" fill="#ffffff"/>
  </g>

  <!-- Beam / "recall" pulling context forward -->
  <g opacity="0.65">
    <polygon points="540,380 980,380 1020,460 980,540 540,540" fill="#ffffff" opacity="0.12"/>
  </g>

  <!-- New session bubble, full opacity, "context restored" -->
  <g>
    <rect x="540" y="380" width="440" height="160" rx="22" fill="#ffffff"/>
    <rect x="568" y="408" width="280" height="14" rx="6" fill="#008859" opacity="0.85"/>
    <rect x="568" y="432" width="380" height="10" rx="5" fill="#008859" opacity="0.6"/>
    <rect x="568" y="452" width="320" height="10" rx="5" fill="#008859" opacity="0.6"/>
    <rect x="568" y="472" width="350" height="10" rx="5" fill="#008859" opacity="0.6"/>
    <rect x="568" y="492" width="240" height="10" rx="5" fill="#008859" opacity="0.6"/>
    <rect x="568" y="514" width="120" height="14" rx="6" fill="#008859"/>
  </g>

  <!-- M MODO mark top-right -->
  <g transform="translate(1120,60)">
    <rect width="100" height="100" rx="22" fill="#ffffff"/>
    <text x="50" y="76" font-family="Quicksand, sans-serif" font-weight="700" font-size="68" fill="#008859" text-anchor="middle" letter-spacing="-0.06em">M</text>
  </g>

  <!-- Title -->
  <text x="80" y="200" font-family="Quicksand, 'Red Hat Display', sans-serif" font-weight="700" font-size="96" fill="#ffffff" letter-spacing="-0.03em">session-recall</text>

  <!-- Subtitle -->
  <text x="80" y="260" font-family="'Red Hat Display', system-ui, sans-serif" font-weight="500" font-size="34" fill="#ffffff" opacity="0.92">Retomá tus conversaciones con Claude.</text>
  <text x="80" y="304" font-family="'Red Hat Display', system-ui, sans-serif" font-weight="500" font-size="34" fill="#ffffff" opacity="0.78">Sin contexto vacío.</text>

  <!-- Footer tag -->
  <text x="80" y="608" font-family="'Red Hat Display', system-ui, sans-serif" font-weight="600" font-size="20" fill="#ffffff" opacity="0.7">soyernomodo · skill para Claude Code</text>
</svg>
